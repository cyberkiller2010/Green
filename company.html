
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#f0f0f0;padding:1rem;color:#000;}
        .container{max-width:1000px;margin:0 auto;}
        .card{background:white;border-radius:20px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        input,button{width:100%;padding:10px;margin:6px 0;border-radius:12px;border:1px solid #ddd;}
        button{background:#ff7e00;color:white;border:none;font-weight:bold;cursor:pointer;}
        table{width:100%;border-collapse:collapse;margin-top:1rem;}
        th,td{border:1px solid #ddd;padding:8px;text-align:left;}
        th{background:#ff7e00;color:white;}
        .bus-item{background:#f9f9f9;padding:1rem;margin-bottom:1rem;border-radius:16px;}
        .logout{background:#333;}
        .green-dot{display:inline-block;width:12px;height:12px;background:green;border-radius:50%;margin-right:6px;}
        .red-dot{display:inline-block;width:12px;height:12px;background:red;border-radius:50%;margin-right:6px;}
        .day-group{background:#fff0e0;padding:10px;border-radius:12px;margin-bottom:15px;}
        .day-title{font-weight:bold;margin-bottom:10px;border-bottom:1px solid #ff7e00;}
    </style>
</head>
<body>
<div class="container">
    <div id="loginDiv" class="card">
        <h2>Company Login</h2>
        <input type="text" id="compUser" placeholder="Username">
        <input type="password" id="compPass" placeholder="Password">
        <button onclick="companyLogin()">Login</button>
        <p>Demo: busco / bus123 (you can change after login)</p>
    </div>

    <div id="dashboardDiv" style="display:none;">
        <div class="card">
            <div class="flex-between" style="display:flex; justify-content:space-between;">
                <h2>🚌 Company Dashboard</h2>
                <button class="logout" onclick="logout()">Logout</button>
            </div>
            <h3>🔐 Change Credentials</h3>
            <input type="text" id="newUsername" placeholder="New Username">
            <input type="password" id="newPassword" placeholder="New Password">
            <button onclick="changeCredentials()">Update Username/Password</button>
            <hr style="margin:15px 0;">
            <h3>💰 Set Your Payment Number</h3>
            <input type="text" id="companyPaymentNumber" placeholder="Mobile money number (e.g., 0977xxxxxx)">
            <button onclick="savePaymentNumber()">Save Payment Number</button>
            <p id="currentPaymentNumber" style="font-size:0.8rem; margin-top:5px;"></p>
        </div>

        <div class="card">
            <h3>➕ Add New Bus</h3>
            <input type="text" id="newFrom" placeholder="From">
            <input type="text" id="newTo" placeholder="To">
            <input type="time" id="newDeparture">
            <input type="text" id="newDuration" placeholder="Duration (e.g., 5h)">
            <input type="number" id="newPrice" placeholder="Price per seat">
            <input type="number" id="newSeats" placeholder="Total seats">
            <input type="text" id="newLogo" placeholder="Logo image URL (optional)">
            <button onclick="addBus()">Add Bus</button>
        </div>

        <div class="card">
            <h3>📋 Your Buses</h3>
            <div id="busesList"></div>
        </div>

        <div class="card">
            <h3>🔍 Search Bookings by Code</h3>
            <input type="text" id="searchCodeInput" placeholder="Enter 28-digit code">
            <button onclick="searchBookingByCode()">Search</button>
            <div id="searchResult"></div>
        </div>

        <div class="card">
            <h3>📖 Bookings (newest to oldest, by day)</h3>
            <div id="bookingsGrouped"></div>
        </div>
    </div>
</div>

<script>
    let currentCompany = "Royal Express";
    let companyCredentials = { username: "busco", password: "bus123" };

    // Initialize data
    if (!localStorage.getItem('company_buses')) {
        let defaultBuses = [
            { id: 1, company: "Royal Express", logo: "https://picsum.photos/50/50?random=1", from: "Lusaka", to: "Livingstone", departure: "08:00", duration: "7h", price: 45, seats: 40, available: 40 },
            { id: 2, company: "Royal Express", logo: "https://picsum.photos/50/50?random=1", from: "Lusaka", to: "Chipata", departure: "14:00", duration: "8h", price: 60, seats: 45, available: 45 }
        ];
        localStorage.setItem('company_buses', JSON.stringify(defaultBuses));
    }
    if (!localStorage.getItem('company_credentials')) {
        localStorage.setItem('company_credentials', JSON.stringify(companyCredentials));
    }
    if (!localStorage.getItem('company_payment_number')) {
        localStorage.setItem('company_payment_number', '0977111222');
    }
    if (!localStorage.getItem('customer_bookings')) {
        localStorage.setItem('customer_bookings', JSON.stringify([]));
    }

    function companyLogin() {
        let u = document.getElementById('compUser').value;
        let p = document.getElementById('compPass').value;
        let stored = JSON.parse(localStorage.getItem('company_credentials'));
        if (u === stored.username && p === stored.password) {
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('dashboardDiv').style.display = 'block';
            loadCompanyBuses();
            loadGroupedBookings();
            displayPaymentNumber();
        } else { alert("Invalid credentials"); }
    }

    function changeCredentials() {
        let newUser = document.getElementById('newUsername').value;
        let newPass = document.getElementById('newPassword').value;
        if (newUser && newPass) {
            localStorage.setItem('company_credentials', JSON.stringify({ username: newUser, password: newPass }));
            alert("Credentials updated! Use new login next time.");
        } else { alert("Fill both fields"); }
    }

    function savePaymentNumber() {
        let number = document.getElementById('companyPaymentNumber').value;
        if (number) {
            localStorage.setItem('company_payment_number', number);
            displayPaymentNumber();
            alert("Payment number saved");
        }
    }

    function displayPaymentNumber() {
        let num = localStorage.getItem('company_payment_number');
        document.getElementById('currentPaymentNumber').innerText = `Current payment number: ${num}`;
        document.getElementById('companyPaymentNumber').value = num;
    }

    function loadCompanyBuses() {
        let buses = JSON.parse(localStorage.getItem('company_buses')).filter(b => b.company === "Royal Express");
        let container = document.getElementById('busesList');
        if (!buses.length) { container.innerHTML = "<p>No buses yet.</p>"; return; }
        let html = '';
        buses.forEach(b => {
            html += `
                <div class="bus-item">
                    <strong>${b.from} → ${b.to}</strong> | Depart: ${b.departure} | Dur: ${b.duration}<br>
                    Price: $${b.price} | Available: ${b.available}/${b.seats}<br>
                    Logo URL: <input type="text" id="logo_${b.id}" value="${b.logo || ''}" style="width:70%; display:inline-block;"><br>
                    <input type="number" id="newPrice_${b.id}" placeholder="New price" style="width:120px">
                    <button onclick="updateBus(${b.id})">Update Price & Logo</button>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function updateBus(busId) {
        let newPrice = document.getElementById(`newPrice_${busId}`).value;
        let newLogo = document.getElementById(`logo_${busId}`).value;
        let buses = JSON.parse(localStorage.getItem('company_buses'));
        let index = buses.findIndex(b => b.id === busId);
        if (newPrice) buses[index].price = parseInt(newPrice);
        if (newLogo) buses[index].logo = newLogo;
        localStorage.setItem('company_buses', JSON.stringify(buses));
        alert("Bus updated");
        loadCompanyBuses();
        // Also refresh customer view by updating the global buses variable? We'll rely on storage.
    }

    function addBus() {
        let from = document.getElementById('newFrom').value;
        let to = document.getElementById('newTo').value;
        let departure = document.getElementById('newDeparture').value;
        let duration = document.getElementById('newDuration').value;
        let price = parseInt(document.getElementById('newPrice').value);
        let seats = parseInt(document.getElementById('newSeats').value);
        let logo = document.getElementById('newLogo').value || "https://via.placeholder.com/50";
        if (!from || !to || !price) { alert("Fill required fields"); return; }
        let buses = JSON.parse(localStorage.getItem('company_buses'));
        let newId = Date.now();
        buses.push({
            id: newId,
            company: "Royal Express",
            from, to, departure, duration, price, seats, available: seats, logo
        });
        localStorage.setItem('company_buses', JSON.stringify(buses));
        alert("Bus added");
        loadCompanyBuses();
    }

    function loadGroupedBookings() {
        let allBookings = JSON.parse(localStorage.getItem('customer_bookings') || '[]');
        let myBookings = allBookings.filter(b => b.bus === "Royal Express");
        // Sort newest first (already by id descending, but ensure)
        myBookings.sort((a,b) => b.id - a.id);
        // Group by date
        let grouped = {};
        myBookings.forEach(b => {
            if (!grouped[b.date]) grouped[b.date] = [];
            grouped[b.date].push(b);
        });
        let container = document.getElementById('bookingsGrouped');
        if (Object.keys(grouped).length === 0) {
            container.innerHTML = "<p>No bookings yet</p>";
            return;
        }
        let html = '';
        for (let date in grouped) {
            html += `<div class="day-group"><div class="day-title">📅 ${date}</div>`;
            grouped[date].forEach(b => {
                let dotClass = b.presented ? 'green-dot' : 'red-dot';
                let statusText = b.presented ? 'Presented' : 'Not presented';
                html += `
                    <div style="border-bottom:1px solid #eee; padding:10px 0;">
                        <div><span class="${dotClass}"></span> <strong>${b.bus}</strong> | ${b.route}</div>
                        <div>Seats: ${b.seats.join(',')} | Total: $${b.total}</div>
                        <div>Phone: ${b.phone} | Code: ${b.code}</div>
                        <div>Status: ${statusText} 
                            ${!b.presented ? `<button onclick="markPresented('${b.code}')" style="width:auto; margin-left:10px;">Mark Presented</button>` : ''}
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function markPresented(code) {
        let bookings = JSON.parse(localStorage.getItem('customer_bookings') || '[]');
        let booking = bookings.find(b => b.code === code);
        if (booking) {
            booking.presented = true;
            localStorage.setItem('customer_bookings', JSON.stringify(bookings));
            loadGroupedBookings();
            alert("Marked as presented (green dot now)");
        }
    }

    function searchBookingByCode() {
        let code = document.getElementById('searchCodeInput').value.trim();
        if (!code) { alert("Enter code"); return; }
        let bookings = JSON.parse(localStorage.getItem('customer_bookings') || '[]');
        let found = bookings.find(b => b.code === code);
        let resultDiv = document.getElementById('searchResult');
        if (found) {
            let dotClass = found.presented ? 'green-dot' : 'red-dot';
            resultDiv.innerHTML = `<div style="background:#e0ffe0; padding:10px; border-radius:12px;">
                <span class="${dotClass}"></span> Booking found:<br>
                Bus: ${found.bus}<br>Route: ${found.route}<br>Date: ${found.date}<br>Seats: ${found.seats.join(',')}<br>Phone: ${found.phone}<br>Status: ${found.presented ? 'Presented' : 'Not presented'}
                ${!found.presented ? `<button onclick="markPresented('${found.code}'); searchBookingByCode();">Mark Presented</button>` : ''}
            </div>`;
        } else {
            resultDiv.innerHTML = "<p>No booking found with that code.</p>";
        }
    }

    function logout() {
        document.getElementById('loginDiv').style.display = 'block';
        document.getElementById('dashboardDiv').style.display = 'none';
    }

    // Initial load
    displayPaymentNumber();
</script>
</body>
</html>
